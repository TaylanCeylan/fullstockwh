<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>User Profile Update</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        body { background-color: #f4f7f6; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .profile-card {
            border: none;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            background-color: #ffffff;
        }
        .form-label { font-weight: 600; color: #495057; }
        .list-group-item.active { background-color: #007bff; border-color: #007bff; }
    </style>
</head>
<body>

<div th:replace="~{fragments/header :: header}"></div>

<div class="container mt-5">
    <div class="row">

        <div class="col-md-3 mb-4">
            <div th:replace="~{user/sidebar :: userSidebar('settings')}"></div>
        </div>

        <div class="col-md-9">
            <div class="card profile-card p-4">
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <h2 class="mb-0">Account Settings</h2>
                    <button type="button" id="editBtn" class="btn btn-outline-primary" onclick="toggleEdit()">
                        <i class="bi bi-pencil"></i> Edit Profile
                    </button>
                </div>

                <form th:action="@{/user/update}" th:object="${user}" method="post">
                    <div class="row mb-3">
                        <div class="col-md-6">
                            <label class="form-label">First Name</label>
                            <div class="view-mode">
                                <p class="form-control-plaintext border-bottom" th:text="*{firstName}">John</p>
                            </div>
                            <div class="edit-mode d-none">
                                <input type="text" class="form-control" th:field="*{firstName}">
                            </div>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Last Name</label>
                            <div class="view-mode">
                                <p class="form-control-plaintext border-bottom" th:text="*{lastName}">Doe</p>
                            </div>
                            <div class="edit-mode d-none">
                                <input type="text" class="form-control" th:field="*{lastName}">
                            </div>
                        </div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Birth Date</label>
                        <div class="view-mode">
                            <p class="form-control-plaintext border-bottom"
                               th:text="${user.birthDate != null ? #dates.format(user.birthDate, 'dd-MM-yyyy') : 'Not set'}"></p>
                        </div>
                        <div class="edit-mode d-none">
                            <input type="date" class="form-control" th:field="*{birthDate}">
                        </div>
                    </div>

                    <div class="edit-mode d-none mt-4">
                        <div class="d-grid gap-2 d-md-flex justify-content-md-end">
                            <button type="button" class="btn btn-light px-4 me-md-2" onclick="toggleEdit()">Cancel</button>
                            <button type="submit" class="btn btn-success px-5">Save Changes</button>
                        </div>
                    </div>
                </form>
            </div>
        </div>

    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script>
    function toggleEdit() {
        const viewElements = document.querySelectorAll('.view-mode');
        const editElements = document.querySelectorAll('.edit-mode');
        const editBtn = document.getElementById('editBtn');

        viewElements.forEach(el => el.classList.toggle('d-none'));
        editElements.forEach(el => el.classList.toggle('d-none'));

        if (editBtn.classList.contains('d-none')) {
            editBtn.classList.remove('d-none');
        } else {
            editBtn.classList.add('d-none');
        }
    }
</script>
</body>
</html>
