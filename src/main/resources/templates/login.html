<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Giriş Yap</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light d-flex align-items-center" style="min-height: 100vh;">

<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-5 col-lg-4">
            <div class="card shadow-sm border-0 rounded-3">
                <div class="card-body p-4">
                    <h3 class="card-title text-center mb-4 fw-bold">Log In</h3>

                    <div th:if="${param.error}" class="alert alert-danger text-center small">
                        Your Email or password is incorrect.
                    </div>
                    <div th:if="${param.logout}" class="alert alert-info text-center small">
                        Logged out successfully.
                    </div>
                    <div th:if="${param.success}" class="alert alert-success text-center small">
                        Registration successful. Please verify your email.
                    </div>

                    <form th:action="@{/login}" method="post">
                        <div class="mb-3">
                            <label for="username" class="form-label text-muted small">Email</label>
                            <input type="email" class="form-control form-control-lg fs-6" id="username" name="username" placeholder="example@mail.com" required autofocus>
                        </div>

                        <div class="mb-4">
                            <label for="password" class="form-label text-muted small">Password</label>
                            <input type="password" class="form-control form-control-lg fs-6" id="password" name="password" placeholder="••••••••" required>
                        </div>

                        <button type="submit" class="btn btn-primary w-100 py-2 fw-semibold">Log In</button>
                    </form>

                    <div class="text-center mt-4 pt-2 border-top">
                        <p class="text-muted small mb-0">Do you have an account? <a th:href="@{/register}" class="text-decoration-none fw-semibold">Register</a></p>
                    </div>
                    <div th:if="${param.verified}" class="alert alert-success text-center small">
                        Email confirmed. You can log in now.
                    </div>
                    <div th:if="${param.error == 'invalid_token'}" class="alert alert-danger text-center small">
                        Invalid verification url.
                    </div>
                    <div th:if="${param.error == 'token_expired'}" class="alert alert-warning text-center small">
                        Your verification token has expired.
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
