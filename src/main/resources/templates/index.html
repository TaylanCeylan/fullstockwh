<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Fullstockwh - Homepage</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        body {
            background-color: #f8f9fa;
        }
        .product-card {
            border: none;
        }
        .img-placeholder {
            background-color: #e9ecef;
            height: 200px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #adb5bd;
        }
    </style>
</head>
<body>

<div th:replace="~{fragments/header :: header}"></div>

<div class="container-fluid mt-4">
    <div class="row">

        <aside class="col-md-3 col-lg-2">
            <div th:replace="~{fragments/sidebar :: sidebar}"></div>
        </aside>

        <main class="col-md-9 col-lg-10">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h2 class="fw-bold">All Products</h2>
                <span class="text-muted" th:text="${products.size() + ' products found'}">0 products found</span>
            </div>

            <div class="row row-cols-1 row-cols-sm-2 row-cols-md-3 row-cols-xl-4 g-4">
                <div class="col" th:each="product : ${products}">
                    <div class="card h-100 shadow-sm product-card">
                        <div class="img-placeholder rounded-top">
                            <i class="bi bi-image display-4"></i>
                        </div>

                        <div class="card-body d-flex flex-column">
                            <div class="mb-2">
                                <span class="badge bg-light text-primary border"
                                      th:text="${product.categoryName != null ? product.categoryName : 'General'}">Category</span>
                            </div>
                            <h5 class="card-title fw-bold text-dark" th:text="${product.name}">Product Name</h5>
                            <p class="card-text text-muted small"
                               th:text="${#strings.abbreviate(product.description, 60)}">No description provided.</p>

                            <div class="mt-auto d-grid">
                                <a href="#" class="btn btn-outline-dark btn-sm">View Details</a>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="col-12 text-center py-5" th:if="${products.isEmpty()}">
                    <i class="bi bi-box-seam display-1 text-muted"></i>
                    <p class="mt-3 fs-5 text-muted">No products have been added yet.</p>
                </div>
            </div>
        </main>

    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
