<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>My Cart - Fullstockwh</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        body { background-color: #f8f9fa; }
        .cart-item-img {
            width: 80px;
            height: 80px;
            object-fit: cover;
            border-radius: 8px;
            background-color: #e9ecef;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #adb5bd;
        }
    </style>
</head>
<body>

<div th:replace="~{fragments/header :: header}"></div>

<div class="container mt-5 mb-5">
    <h2 class="fw-bold mb-4">Shopping Cart</h2>

    <div th:if="${cart.cartItems == null or cart.cartItems.isEmpty()}" class="text-center py-5 bg-white rounded shadow-sm">
        <i class="bi bi-cart-x display-1 text-muted mb-3"></i>
        <h3>Your cart is empty</h3>
        <p class="text-muted">You haven't added anything to your cart yet.</p>
        <a th:href="@{/}" class="btn btn-dark mt-3 px-4 py-2">Start Shopping</a>
    </div>

    <div th:if="${cart.cartItems != null and !cart.cartItems.isEmpty()}" class="row g-4">

        <div class="col-lg-8">
            <div class="card border-0 shadow-sm">
                <div class="card-body p-4">

                    <div th:each="item : ${cart.cartItems}" class="row align-items-center border-bottom py-3 mb-2">

                        <div class="col-2">
                            <div class="cart-item-img">
                                <i class="bi bi-image fs-3"></i>
                            </div>
                        </div>

                        <div class="col-5">
                            <h5 class="fw-bold mb-1" th:text="${item.productVariant.product.name}">Product Name</h5>
                            <p class="text-muted mb-0 small">
                                Color: <span class="fw-semibold text-dark" th:text="${item.productVariant.color}">-</span> |
                                Size: <span class="fw-semibold text-dark" th:text="${item.productVariant.size}">-</span>
                            </p>
                        </div>

                        <div class="col-2 text-center">
                            <span class="badge bg-light text-dark border px-3 py-2 fs-6" th:text="${item.quantity}">1 pcs</span>
                        </div>

                        <div class="col-2 text-end">
                            <span class="fw-bold fs-5" th:text="${(item.productVariant.product.price * item.quantity) + '₺'}">₺0.00</span>
                        </div>

                        <div class="col-1 text-end">
                            <form th:action="@{/cart/remove}" method="post" class="m-0 p-0">
                                <input type="hidden" name="variantId" th:value="${item.productVariant.id}">

                                <button type="submit" class="btn btn-outline-danger btn-sm" title="Remove Item">
                                    <i class="bi bi-trash"></i>
                                </button>
                            </form>
                        </div>
                    </div>

                </div>
            </div>
        </div>

        <div class="col-lg-4">
            <div class="card border-0 shadow-sm bg-dark text-white">
                <div class="card-body p-4">
                    <h4 class="fw-bold mb-4">Order Summary</h4>

                    <div class="d-flex justify-content-between mb-3">
                        <span>Total Items</span>
                        <span th:text="${cart.cartItems.size()}">0</span>
                    </div>

                    <hr class="border-secondary">

                    <div class="d-flex justify-content-between mb-4 mt-3">
                        <span class="fs-5">Total</span>
                        <span class="fs-5 fw-bold text-success" th:text="${cart.totalAmount + '₺'}">₺0.00</span>
                        <span class="fs-5 fw-bold">Proceed to Checkout</span>
                    </div>

                    <button class="btn btn-light w-100 py-3 fw-bold">Checkout</button>
                    <a th:href="@{/}" class="btn btn-outline-light w-100 mt-2 py-2">Continue Shopping</a>
                </div>
            </div>
        </div>

    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
