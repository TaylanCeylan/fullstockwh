<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Register</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light d-flex align-items-center" style="min-height: 100vh;">

<div class="container">
  <div class="row justify-content-center">
    <div class="col-md-5 col-lg-4">
      <div class="card shadow-sm border-0 rounded-3">
        <div class="card-body p-4">
          <h3 class="card-title text-center mb-4 fw-bold">Register</h3>

          <div th:if="${error}" class="alert alert-danger text-center small" th:text="${error}"></div>

          <form th:action="@{/register}" th:object="${user}" method="post">

            <div class="mb-3">
              <label for="email" class="form-label text-muted small">Email Address</label>
              <input type="email" class="form-control form-control-lg fs-6" th:field="*{email}" placeholder="example@mail.com" required>
            </div>

            <div class="mb-4">
              <label for="password" class="form-label text-muted small">Password</label>
              <input type="password" class="form-control form-control-lg fs-6" th:field="*{password}" placeholder="Minimum 6 characters" required>
            </div>

            <button type="submit" class="btn btn-success w-100 py-2 fw-semibold">Register</button>
          </form>

          <div class="text-center mt-4 pt-2 border-top">
            <p class="text-muted small mb-0">Already have an account? <a th:href="@{/login}" class="text-decoration-none fw-semibold">Log In</a></p>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
