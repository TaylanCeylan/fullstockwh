<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>

<div th:fragment="sidebar" class="card border-0 shadow-sm">
    <div class="card-body p-3">
        <h6 class="fw-bold mb-3">Categories</h6>
        <ul class="nav flex-column gap-2">

            <li class="nav-item">
                <a th:href="@{/}"
                   class="nav-link p-0 fw-semibold"
                   th:classappend="${activeCategory == null} ? 'text-primary' : 'text-dark'">
                    <i class="bi bi-grid small me-2"></i>All Products
                </a>
            </li>
            <li class="nav-item">
                <a th:href="@{/category/{name}(name='Shirts')}"
                   class="nav-link p-0"
                   th:classappend="${activeCategory == 'Shirts'} ? 'text-primary fw-semibold' : 'text-dark'">
                    <i class="bi bi-chevron-right small me-2"></i>Shirts
                </a>
            </li>
            <li class="nav-item">
                <a th:href="@{/category/{name}(name='Jeans')}"
                   class="nav-link p-0"
                   th:classappend="${activeCategory == 'Jeans'} ? 'text-primary fw-semibold' : 'text-dark'">
                    <i class="bi bi-chevron-right small me-2"></i>Jeans
                </a>
            </li>
            <li class="nav-item">
                <a th:href="@{/category/{name}(name='Accessories')}"
                   class="nav-link p-0"
                   th:classappend="${activeCategory == 'Accessories'} ? 'text-primary fw-semibold' : 'text-dark'">
                    <i class="bi bi-chevron-right small me-2"></i>Accessories
                </a>
            </li>
        </ul>

        <hr class="my-4">
        
    </div>
</div>

</body>
</html>
