<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>

<div th:fragment="sidebar" class="card border-0 shadow-sm">
    <div class="card-body p-3">

        <a th:href="@{/}"
           class="d-flex align-items-center gap-2 text-decoration-none mb-3 fw-semibold"
           th:classappend="${gender == null or gender == ''} and ${categoryId == null} and ${search == null or search == ''} ? 'text-primary' : 'text-dark'">
            <i class="bi bi-grid-3x3-gap"></i> All Products
        </a>

        <hr class="my-2">


        <div class="accordion accordion-flush" id="genderAccordion">


            <div class="accordion-item border-0">
                <h2 class="accordion-header">
                    <button type="button"
                            data-bs-toggle="collapse"
                            data-bs-target="#menCollapse"
                            th:attr="aria-expanded=${gender == 'MEN'}"
                            th:classappend="${gender != 'MEN'} ? 'collapsed'"
                            class="accordion-button py-2 px-0 bg-transparent shadow-none fw-semibold small text-uppercase d-flex align-items-center w-100">
                        <span th:classappend="${gender == 'MEN'} ? 'text-primary' : 'text-dark'">
                            <i class="bi bi-gender-male me-2"></i> MEN
                        </span>
                        <i class="bi bi-chevron-down accordion-arrow ms-auto"></i>
                    </button>
                </h2>
                <div id="menCollapse"
                     class="accordion-collapse collapse"
                     th:classappend="${gender == 'MEN'} ? 'show' : ''">
                    <div class="accordion-body ps-3 pe-0 py-1">
                        <a th:href="@{/(gender='MEN')}"
                           class="d-block text-decoration-none py-1 small"
                           th:classappend="${gender == 'MEN' and categoryId == null} ? 'text-primary fw-semibold' : 'text-secondary'">
                            <i class="bi bi-dash me-1"></i> All Men
                        </a>
                        <a th:each="cat : ${menCategories}"
                           th:href="@{/(gender='MEN', categoryId=${cat.id})}"
                           th:text="${cat.name}"
                           class="d-block text-decoration-none py-1 small"
                           th:classappend="${categoryId != null and categoryId == cat.id} ? 'text-primary fw-semibold' : 'text-secondary'">
                        </a>
                    </div>
                </div>
            </div>


            <div class="accordion-item border-0">
                <h2 class="accordion-header">
                    <button type="button"
                            data-bs-toggle="collapse"
                            data-bs-target="#womenCollapse"
                            th:attr="aria-expanded=${gender == 'WOMEN'}"
                            th:classappend="${gender != 'WOMEN'} ? 'collapsed'"
                            class="accordion-button py-2 px-0 bg-transparent shadow-none fw-semibold small text-uppercase d-flex align-items-center w-100">
                        <span th:classappend="${gender == 'WOMEN'} ? 'text-primary' : 'text-dark'">
                            <i class="bi bi-gender-female me-2"></i> WOMEN
                        </span>
                        <i class="bi bi-chevron-down accordion-arrow ms-auto"></i>
                    </button>
                </h2>
                <div id="womenCollapse"
                     class="accordion-collapse collapse"
                     th:classappend="${gender == 'WOMEN'} ? 'show' : ''">
                    <div class="accordion-body ps-3 pe-0 py-1">
                        <a th:href="@{/(gender='WOMEN')}"
                           class="d-block text-decoration-none py-1 small"
                           th:classappend="${gender == 'WOMEN' and categoryId == null} ? 'text-primary fw-semibold' : 'text-secondary'">
                            <i class="bi bi-dash me-1"></i> All Women
                        </a>
                        <a th:each="cat : ${womenCategories}"
                           th:href="@{/(gender='WOMEN', categoryId=${cat.id})}"
                           th:text="${cat.name}"
                           class="d-block text-decoration-none py-1 small"
                           th:classappend="${categoryId != null and categoryId == cat.id} ? 'text-primary fw-semibold' : 'text-secondary'">
                        </a>
                    </div>
                </div>
            </div>


            <div class="accordion-item border-0">
                <h2 class="accordion-header">
                    <button type="button"
                            data-bs-toggle="collapse"
                            data-bs-target="#unisexCollapse"
                            th:attr="aria-expanded=${gender == 'UNISEX'}"
                            th:classappend="${gender != 'UNISEX'} ? 'collapsed'"
                            class="accordion-button py-2 px-0 bg-transparent shadow-none fw-semibold small text-uppercase d-flex align-items-center w-100">
                        <span th:classappend="${gender == 'UNISEX'} ? 'text-primary' : 'text-dark'">
                             <i class="bi bi-gender-ambiguous me-2"></i> UNISEX
                        </span>
                        <i class="bi bi-chevron-down accordion-arrow ms-auto"></i>
                    </button>
                </h2>
                <div id="unisexCollapse"
                     class="accordion-collapse collapse"
                     th:classappend="${gender == 'UNISEX'} ? 'show' : ''">
                    <div class="accordion-body ps-3 pe-0 py-1">
                        <a th:href="@{/(gender='UNISEX')}"
                           class="d-block text-decoration-none py-1 small"
                           th:classappend="${gender == 'UNISEX' and categoryId == null} ? 'text-primary fw-semibold' : 'text-secondary'">
                            <i class="bi bi-dash me-1"></i> All Unisex
                        </a>
                        <a th:each="cat : ${unisexCategories}"
                           th:href="@{/(gender='UNISEX', categoryId=${cat.id})}"
                           th:text="${cat.name}"
                           class="d-block text-decoration-none py-1 small"
                           th:classappend="${categoryId != null and categoryId == cat.id} ? 'text-primary fw-semibold' : 'text-secondary'">
                        </a>
                    </div>
                </div>
            </div>

        </div>

        <hr class="my-3">


        <p class="fw-semibold small text-uppercase text-muted mb-2">Price Range</p>
        <form th:action="@{/}" method="get">
            <input type="hidden" name="gender"     th:value="${gender}"/>
            <input type="hidden" name="categoryId" th:value="${categoryId}"/>
            <input type="hidden" name="search"     th:value="${search}"/>

            <div class="d-flex gap-2 mb-2">
                <input type="number" name="minPrice"
                       th:value="${minPrice}"
                       class="form-control form-control-sm"
                       placeholder="Min ₺" min="0" step="1"/>
                <input type="number" name="maxPrice"
                       th:value="${maxPrice}"
                       class="form-control form-control-sm"
                       placeholder="Max ₺" min="0" step="1"/>
            </div>
            <button type="submit" class="btn btn-dark btn-sm w-100">Apply</button>

            <a th:if="${minPrice != null or maxPrice != null}"
               th:href="@{/(gender=${gender}, categoryId=${categoryId}, search=${search})}"
               class="btn btn-outline-secondary btn-sm w-100 mt-1">
                Clear Price
            </a>
        </form>

    </div>
</div>

</body>
</html>
