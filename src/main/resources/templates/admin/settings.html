<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fullstockwh | Settings</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    body { background-color: #f8f9fa; font-family: 'Segoe UI', sans-serif; }
    .sidebar { height: 100vh; width: 250px; position: fixed; background: #eaeff5; padding-top: 20px; border-right: 1px solid #dee2e6; }
    .sidebar h5 { padding-left: 20px; color: #333; font-weight: bold; margin-bottom: 25px; }
    .sidebar a { padding: 12px 25px; display: block; color: #4a5568; text-decoration: none; font-size: 0.95rem; }
    .sidebar a:hover { background: #e2e8f0; }
    .sidebar a.active { color: #3182ce; font-weight: bold; background: #e2e8f0; }

    .main-content { margin-left: 250px; padding: 40px; }


    .settings-card { background: white; border-radius: 12px; padding: 30px; border: none; max-width: 600px; }
    .form-label { font-weight: 600; color: #4a5568; margin-top: 15px; }
    .form-control { border-radius: 8px; border: 1px solid #e2e8f0; padding: 10px; }

    .btn-update { background-color: #28a745; color: white; font-weight: bold; border-radius: 8px; width: 100%; margin-top: 25px; padding: 12px; border: none; }
    .btn-update:hover { background-color: #218838; }


    .logout-area { position: absolute; bottom: 20px; width: 100%; }
    .logout-area hr { margin: 0 20px 10px 20px; border-top: 1px solid #cbd5e0; }
    .logout-link { color: #e53e3e !important; font-weight: bold !important; padding: 10px 25px; display: block; text-decoration: none; }
    .logout-link:hover { background: #fff5f5 !important; }
  </style>
</head>
<body>

<div class="sidebar">
  <h5>Admin Menu</h5>
  <a th:href="@{/admin/}">Dashboard</a>
  <a th:href="@{/admin/employees}">Employees</a>
  <a th:href="@{/admin/catalog}">Catalog</a>
  <a th:href="@{/admin/pricing}" >Pricing</a>
  <a th:href="@{/admin/supplyrequests}">Supply Requests</a>
  <a th:href="@{/admin/orders}">Orders</a>
  <a th:href="@{/admin/analytics}">Analytics</a>
  <a th:href="@{/admin/sustainability}" >Sustainability</a>
  <a th:href="@{/admin/settings}" class="active">Settings</a>
  <div class="logout-area">
    <hr>
    <a th:href="@{/logout}" class="logout-link"><i class="fas fa-sign-out-alt me-2"></i> Logout</a>
  </div>
</div>

<div class="main-content">
  <h3 class="fw-bold mb-4">Admin Profile Settings</h3>

  <div class="settings-card shadow-sm">
    <form>
      <div class="mb-3">
        <label class="form-label">Name:</label>
        <input type="text" class="form-control" placeholder="Enter your name">
      </div>

      <div class="mb-3">
        <label class="form-label">Email:</label>
        <input type="email" class="form-control" placeholder="Enter your email">
      </div>

      <div class="mb-3">
        <label class="form-label">Phone:</label>
        <input type="text" class="form-control" placeholder="Enter your phone number">
      </div>

      <button type="submit" class="btn-update">Update Profile</button>
    </form>
  </div>
</div>

</body>
</html>
