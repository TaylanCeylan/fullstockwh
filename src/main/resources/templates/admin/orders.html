<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fullstockwh | Orders</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    body { background-color: #f8f9fa; font-family: 'Segoe UI', sans-serif; }
    .sidebar { height: 100vh; width: 250px; position: fixed; background: #eaeff5; padding-top: 20px; border-right: 1px solid #dee2e6; }
    .sidebar h5 { padding-left: 20px; color: #333; font-weight: bold; margin-bottom: 25px; }
    .sidebar a { padding: 10px 25px; display: block; color: #4a5568; text-decoration: none; font-size: 0.95rem; }
    .sidebar a:hover { background: #e2e8f0; }
    .sidebar a.active { color: #3182ce; font-weight: bold; background: #e2e8f0; }
    .main-content { margin-left: 250px; padding: 40px; }
    .filter-label { font-weight: 600; font-size: 0.85rem; color: #4a5568; margin-bottom: 5px; }
    .logout-area { position: absolute; bottom: 20px; width: 100%; }
    .logout-link { color: #e53e3e !important; font-weight: bold !important; padding: 10px 25px; display: block; text-decoration: none; }
    .logout-area hr { margin: 0 20px 10px 20px; border-top: 1px solid #cbd5e0; }
  </style>
</head>
<body>
<div class="sidebar">
  <h5>Admin Menu</h5>
  <a th:href="@{/admin/}">Dashboard</a>
  <a th:href="@{/admin/employees}">Employees</a>
  <a th:href="@{/admin/catalog}">Catalog</a>
  <a th:href="@{/admin/pricing}" >Pricing</a>
  <a th:href="@{/admin/supplyrequests}">Supply Requests</a>
  <a th:href="@{/admin/orders}" class="active">Orders</a>
  <a th:href="@{/admin/analytics}">Analytics</a>
  <a th:href="@{/admin/sustainability}" >Sustainability</a>
  <a th:href="@{/admin/settings}">Settings</a>
  <div class="logout-area"><hr><a th:href="@{/logout}" class="logout-link"><i class="fas fa-sign-out-alt me-2"></i> Logout</a></div>
</div>
<div class="main-content">
  <h2 class="fw-bold mb-4">Global Order Oversight</h2>
  <div class="row mb-5">
    <div class="col-md-3"><label class="filter-label">Filter by Status:</label><select class="form-select shadow-sm"><option>All</option><option>Delivered</option></select></div>
    <div class="col-md-3"><label class="filter-label">Filter by Date:</label><input type="date" class="form-control shadow-sm"></div>
    <div class="col-md-3"><label class="filter-label">Filter by Customer ID:</label><input type="text" class="form-control shadow-sm" placeholder="Customer ID"></div>
  </div>
  <h4 class="fw-bold mb-3">View All Orders</h4>
  <div class="card shadow-sm border-0"><div class="card-body p-0"><table class="table table-hover align-middle mb-0"><thead class="table-light"><tr><th class="ps-3">Order ID</th><th>Customer ID</th><th>Product</th><th>Qty</th><th>Price</th><th>Status</th><th>Actions</th></tr></thead>
    <tbody><tr><td class="ps-3">ORD001</td><td>CUST001</td><td>Laptop X</td><td>1</td><td>$1200.00</td><td><span class="badge bg-success">Delivered</span></td><td><button class="btn btn-primary btn-sm">View Details</button> <button class="btn btn-danger btn-sm">Cancel</button></td></tr></tbody>
  </table></div></div>
</div>
</body>
</html>
