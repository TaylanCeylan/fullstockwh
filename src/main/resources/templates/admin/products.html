<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Product Management - Admin Panel</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f4f7f6; }
        .sidebar { width: 280px; height: 100vh; position: fixed; left: 0; top: 0; background-color: #343a40; z-index: 1000; }
        .main-content { margin-left: 280px; padding: 40px; min-height: 100vh; }
        .container-fluid { max-width: 1300px; }
        .error-text { color: #dc3545; font-size: 0.8rem; margin-top: 4px; }
        .card { border: none; border-radius: 12px; transition: all 0.3s; }
        .card-header { border-radius: 12px 12px 0 0 !important; font-weight: 600; }
        .table align-middle td { vertical-align: middle; }
    </style>
</head>
<body>

<div th:replace="~{admin/sidebar :: adminSidebar}"></div>

<div class="main-content">
    <div class="container-fluid">

        <div class="card shadow-sm mb-5">
            <div class="card-header bg-primary text-white">
                <h5 class="mb-0">Quick Product Entry</h5>
            </div>
            <div class="card-body">
                <form th:action="@{/admin/products/add}" th:object="${product}" method="post">
                    <div class="row g-3 align-items-start">

                        <div class="col-md-3">
                            <label class="form-label fw-bold small text-muted">PRODUCT NAME</label>
                            <input type="text" th:field="*{name}" class="form-control" placeholder="e.g. Smartphone" required>
                            <div class="error-text" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></div>
                        </div>

                        <div class="col-md-3">
                            <label class="form-label fw-bold small text-muted">CATEGORY</label>
                            <input class="form-control" list="categoryOptions" th:field="*{categoryName}" placeholder="Select or type new..." required>
                            <datalist id="categoryOptions">
                                <option value="Electronics">
                                <option value="Fashion">
                                <option value="Home & Living">
                                <option value="Cosmetics">
                                <option value="Sports">
                            </datalist>
                            <div class="error-text" th:if="${#fields.hasErrors('categoryName')}" th:errors="*{categoryName}"></div>
                        </div>

                        <div class="col-md-4">
                            <label class="form-label fw-bold small text-muted">DESCRIPTION</label>
                            <input type="text" th:field="*{description}" class="form-control" placeholder="Brief specifications...">
                        </div>

                        <div class="col-md-2 mt-auto">
                            <div style="height: 32px;" class="d-none d-md-block"></div>
                            <button type="submit" class="btn btn-success w-100 fw-bold shadow-sm">Save Product</button>
                        </div>
                    </div>
                </form>
            </div>
        </div>

        <div class="card shadow-sm">
            <div class="card-header bg-dark text-white d-flex justify-content-between align-items-center">
                <h5 class="mb-0">Product Inventory</h5>
                <span class="badge bg-primary px-3 py-2" th:text="${productsList.size() + ' Items Total'}">0 Items</span>
            </div>
            <div class="card-body p-0">
                <div class="table-responsive">
                    <table class="table table-hover align-middle mb-0">
                        <thead class="table-light text-muted">
                        <tr>
                            <th style="width: 100px;" class="ps-4">ID</th>
                            <th>Name</th>
                            <th>Category</th>
                            <th>Description</th>
                            <th class="text-center" style="width: 180px;">Actions</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:each="p : ${productsList}">
                            <td class="ps-4 fw-bold text-secondary" th:text="${'#' + p.id}">#1</td>
                            <td th:text="${p.name}" class="fw-semibold">Product Name</td>
                            <td>
                                    <span class="badge rounded-pill bg-info text-dark px-3"
                                          th:text="${p.categoryName != null ? p.categoryName : 'Uncategorized'}">Category</span>
                            </td>
                            <td th:text="${p.description}" class="text-muted small">No description available.</td>
                            <td class="text-center">
                                <div class="btn-group btn-group-sm shadow-sm">
                                    <a href="#" class="btn btn-white border">Edit</a>
                                    <a href="#" class="btn btn-danger">Delete</a>
                                </div>
                            </td>
                        </tr>

                        <tr th:if="${productsList.isEmpty()}">
                            <td colspan="5" class="text-center py-5 text-muted">
                                <div class="py-3">
                                    <i class="bi bi-box-seam display-4 d-block mb-3"></i>
                                    <p class="fs-5">Your inventory is empty. Add your first product above!</p>
                                </div>
                            </td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
