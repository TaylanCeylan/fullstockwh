<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f4f7f6; }
        .sidebar { width: 280px; height: 100vh; position: fixed; left: 0; top: 0; background-color: #343a40; z-index: 1000; }
        .main-content { margin-left: 280px; padding: 40px; min-height: 100vh; }
        .container-fluid { max-width: 1300px; }
        .error-text { color: #dc3545; font-size: 0.8rem; margin-top: 4px; }
        .card { border: none; border-radius: 12px; transition: all 0.3s; }
        .card-header { border-radius: 12px 12px 0 0 !important; font-weight: 600; }
        .table align-middle td { vertical-align: middle; }
    </style>
</head>
<body>

<div >
    <div th:replace="~{admin/sidebar :: adminSidebar}"></div>

    <div class="main-content">
        <div class="container-fluid">
            <div class="row">
                <div class="col-md-4 mb-4">
                    <div class="card card-stat bg-primary text-white shadow">
                        <div class="card-body py-4">
                            <h6 class="text-uppercase opacity-75">Total Products</h6>
                            <h1 class="display-5 fw-bold" th:text="${totalProducts ?: '0'}">0</h1>
                        </div>
                    </div>
                </div>

                <div class="col-md-4 mb-4">
                    <div class="card card-stat bg-success text-white shadow">
                        <div class="card-body py-4">
                            <h6 class="text-uppercase opacity-75">Total Stock</h6>
                            <h1 class="display-5 fw-bold" th:text="${totalStock ?: '0'}">0</h1>
                        </div>
                    </div>
                </div>

                <div class="col-md-4 mb-4">
                    <div class="card card-stat bg-warning text-dark shadow">
                        <div class="card-body py-4">
                            <h6 class="opacity-75">TOTAL CATEGORIES</h6>
                            <h1 class="display-5 fw-bold" th:text="${totalCategories ?: '0'}">0</h1>
                        </div>
                    </div>
                </div>
            </div>
            <div class="row mt-4">
                <div class="col-12">
                    <div class="card border-0 shadow-sm">
                        <div class="card-header bg-white py-3">
                            <h5 class="card-title mb-0 fw-bold">Category Bar chart</h5>
                        </div>
                        <div class="card-body">
                            <div style="position: relative; height: 400px; width: 100%;">
                            <canvas id="categoryChart"></canvas>
                        </div>
                    </div>
                </div>
            </div>
            <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script th:inline="javascript">
    const categoryStats = [[${categoryStats}]];

    const labels = Object.keys(categoryStats);
    const data = Object.values(categoryStats);

    const ctx = document.getElementById('categoryChart').getContext('2d');

    new Chart(ctx, {
        type: 'bar',
        data: {
            labels: labels,
            datasets: [{
                label: 'Product Counts',
                data: data,
                backgroundColor: 'rgba(52, 152, 219, 0.7)',
                borderColor: 'rgba(52, 152, 219, 1)',
                borderWidth: 1,
                borderRadius: 5
            }]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            scales: {
                y: {
                    beginAtZero: true,
                    ticks: {
                        stepSize: 1
                    }
                }
            },
            plugins: {
                legend: {
                    display: false
                }
            }
        }
    });
</script>
</body>
</html>
