<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fullstockwh | Analytics</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { background-color: #f8f9fa; font-family: 'Segoe UI', sans-serif; }
        .sidebar { height: 100vh; width: 250px; position: fixed; background: #eaeff5; padding-top: 20px; border-right: 1px solid #dee2e6; }
        .sidebar h5 { padding-left: 20px; color: #333; font-weight: bold; margin-bottom: 25px; }
        .sidebar a { padding: 10px 25px; display: block; color: #4a5568; text-decoration: none; font-size: 0.95rem; }
        .sidebar a:hover { background: #e2e8f0; }
        .sidebar a.active { color: #3182ce; font-weight: bold; background: #e2e8f0; }
        .main-content { margin-left: 250px; padding: 40px; }
        .chart-container { background: white; border: 1px solid #dee2e6; border-radius: 8px; padding: 20px; margin-bottom: 30px; }
        .logout-area { position: absolute; bottom: 20px; width: 100%; }
        .logout-link { color: #e53e3e !important; font-weight: bold !important; padding: 10px 25px; display: block; text-decoration: none; }
        .logout-area hr { margin: 0 20px 10px 20px; border-top: 1px solid #cbd5e0; }
    </style>
</head>
<body>
<div class="sidebar">
    <h5>Admin Menu</h5>
    <a th:href="@{/admin/}">Dashboard</a>
    <a th:href="@{/admin/employees}">Employees</a>
    <a th:href="@{/admin/catalog}">Catalog</a>
    <a th:href="@{/admin/pricing}" >Pricing</a>
    <a th:href="@{/admin/supplyrequests}">Supply Requests</a>
    <a th:href="@{/admin/orders}">Orders</a>
    <a th:href="@{/admin/analytics}" class="active">Analytics</a>
    <a th:href="@{/admin/sustainability}" >Sustainability</a>
    <a th:href="@{/admin/settings}">Settings</a>
    <div class="logout-area"><hr><a th:href="@{/logout}" class="logout-link"><i class="fas fa-sign-out-alt me-2"></i> Logout</a></div>
</div>
<div class="main-content">
    <h2 class="fw-bold mb-4">Financial & Sales Analytics Dashboard</h2>
    <div class="chart-container shadow-sm"><h5 class="fw-bold mb-3">Financial Analysis Reports</h5><canvas id="finChart" style="max-height: 250px;"></canvas></div>
    <div class="chart-container shadow-sm"><h5 class="fw-bold mb-3">Sales Figures per Product</h5><canvas id="salesChart" style="max-height: 250px;"></canvas></div>
</div>
<script>
    new Chart(document.getElementById('finChart'), { type: 'line', data: { labels: ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'], datasets: [{ label: 'Revenue', data: [12000, 19000, 15000, 25000, 22000, 30000, 28000], borderColor: '#3182ce', fill: true, tension: 0.4 }] } });
    new Chart(document.getElementById('salesChart'), { type: 'bar', data: { labels: ['Laptop','Phone','Tablet','Watch'], datasets: [{ label: 'Units Sold', data: [65, 92, 45, 38], backgroundColor: '#48bb78' }] } });
</script>
</body>
</html>
