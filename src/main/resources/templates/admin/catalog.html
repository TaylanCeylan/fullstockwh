<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fullstockwh | Catalog Management</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    body { background-color: #f8f9fa; font-family: 'Segoe UI', sans-serif; }
    .sidebar { height: 100vh; width: 250px; position: fixed; background: #eaeff5; padding-top: 20px; border-right: 1px solid #dee2e6; }
    .sidebar h5 { padding-left: 20px; color: #333; font-weight: bold; margin-bottom: 25px; }
    .sidebar a { padding: 12px 25px; display: block; color: #4a5568; text-decoration: none; font-size: 0.95rem; }
    .sidebar a:hover { background: #e2e8f0; }
    .sidebar a.active { color: #3182ce; font-weight: bold; background: #e2e8f0; }

    .main-content { margin-left: 250px; padding: 40px; }


    .filter-section { background: white; border-radius: 12px; padding: 25px; border: none; margin-bottom: 25px; }
    .catalog-table { background: white; border-radius: 12px; overflow: hidden; }
    .product-img-placeholder { width: 50px; height: 50px; border: 1px solid #eee; border-radius: 8px; display: flex; align-items: center; justify-content: center; background: #fdfdfd; }

    .filter-group-label { font-size: 0.85rem; font-weight: bold; color: #4a5568; margin-bottom: 8px; display: block; }
    .form-check-label { font-size: 0.85rem; margin-right: 5px; }
    .form-select-sm { font-size: 0.85rem; border-radius: 6px; }

    .logout-area { position: absolute; bottom: 20px; width: 100%; }
    .logout-area hr { margin: 0 20px 10px 20px; border-top: 1px solid #cbd5e0; }
    .logout-link { color: #e53e3e !important; font-weight: bold !important; padding: 10px 25px; display: block; text-decoration: none; }
  </style>
</head>
<body>

<div class="sidebar">
  <h5>Admin Menu</h5>
  <a th:href="@{/admin/}">Dashboard</a>
  <a th:href="@{/admin/employees}">Employees</a>
  <a th:href="@{/admin/catalog}" class="active">Catalog</a>
  <a th:href="@{/admin/pricing}" >Pricing</a>
  <a th:href="@{/admin/supplyrequests}">Supply Requests</a>
  <a th:href="@{/admin/orders}">Orders</a>
  <a th:href="@{/admin/analytics}">Analytics</a>
  <a th:href="@{/admin/sustainability}" >Sustainability</a>
  <a th:href="@{/admin/settings}">Settings</a>
  <div class="logout-area">
    <hr>
    <a th:href="@{/logout}" class="logout-link"><i class="fas fa-sign-out-alt me-2"></i> Logout</a>
  </div>
</div>

<div class="main-content">
  <h2 class="fw-bold mb-4">Catalog Management</h2>

  <div class="filter-section shadow-sm">
    <div class="row align-items-end g-3">
      <div class="col-md-3">
        <span class="filter-group-label">Search Product</span>
        <input type="text" class="form-control form-control-sm" placeholder="Search by title...">
      </div>

      <div class="col-md-2">
        <span class="filter-group-label">Filter Color</span>
        <select class="form-select form-select-sm shadow-sm">
          <option selected>All Colors</option>
          <option value="red">Red</option>
          <option value="blue">Blue</option>
          <option value="green">Green</option>
          <option value="black">Black</option>
          <option value="white">White</option>
          <option value="yellow">Yellow</option>
        </select>
      </div>

      <div class="col-md-4">
        <span class="filter-group-label">Filter Size</span>
        <div class="d-flex flex-wrap gap-2">
          <div class="form-check form-check-inline m-0">
            <input class="form-check-input" type="checkbox" id="s">
            <label class="form-check-label" for="s">S</label>
          </div>
          <div class="form-check form-check-inline m-0">
            <input class="form-check-input" type="checkbox" id="m">
            <label class="form-check-label" for="m">M</label>
          </div>
          <div class="form-check form-check-inline m-0">
            <input class="form-check-input" type="checkbox" id="l">
            <label class="form-check-label" for="l">L</label>
          </div>
          <div class="form-check form-check-inline m-0">
            <input class="form-check-input" type="checkbox" id="xl">
            <label class="form-check-label" for="xl">XL</label>
          </div>
          <div class="form-check form-check-inline m-0">
            <input class="form-check-input" type="checkbox" id="xxl">
            <label class="form-check-label" for="xxl">XXL</label>
          </div>
        </div>
      </div>

      <div class="col-md-3 text-end">
        <button class="btn btn-primary btn-sm px-4 shadow-sm">Add New Product</button>
      </div>
    </div>
  </div>

  <div class="catalog-table shadow-sm">
    <table class="table table-hover align-middle mb-0">
      <thead class="table-light">
      <tr>
        <th class="ps-4 py-3" style="width: 150px;">Product Image</th>
        <th>Product Title</th>
        <th class="text-end pe-5">Price</th>
      </tr>
      </thead>
      <tbody>
      <tr>
        <td class="ps-4">
          <div class="product-img-placeholder">
            <i class="fas fa-tshirt text-muted"></i>
          </div>
        </td>
        <td class="fw-bold">Product Title 1</td>
        <td class="text-end pe-5 fw-bold text-primary">$XX.XX</td>
      </tr>
      <tr>
        <td class="ps-4">
          <div class="product-img-placeholder">
            <i class="fas fa-tshirt text-muted"></i>
          </div>
        </td>
        <td class="fw-bold">Product Title 2</td>
        <td class="text-end pe-5 fw-bold text-primary">$YY.YY</td>
      </tr>
      </tbody>
    </table>
  </div>
</div>

</body>
</html>
